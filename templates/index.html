<!DOCTYPE html>
<html>
<head>
    <title>V2V Pro Dashboard</title>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }

        h2 {
            margin-top: 20px;
        }

        #road {
            width: 90%;
            height: 200px;
            margin: 30px auto;
            background: #ddd;
            position: relative;
            border-radius: 10px;
        }

        .car {
            width: 50px;
            height: 25px;
            position: absolute;
            border-radius: 5px;
            color: white;
            text-align: center;
            line-height: 25px;
            font-size: 12px;
        }
    </style>
</head>

<body>

<h2>🚗 V2V Live Dashboard</h2>

<div id="road"></div>

<script>
var socket = io();
var road = document.getElementById("road");

socket.on('update', function(data) {

    road.innerHTML = "";

    let y = 50;

    for (let vid in data) {

        let v = data[vid];

        let distance = v.distance;

        let x = (100 - distance) * 5;  // movement

        let color = "green";
        if (distance < 30) color = "orange";
        if (distance < 10) color = "red";

        let car = document.createElement("div");
        car.className = "car";
        car.style.left = x + "px";
        car.style.top = y + "px";
        car.style.background = color;

        car.innerHTML = "V" + vid;

        road.appendChild(car);

        y += 40;
    }
});
</script>

</body>
</html>
